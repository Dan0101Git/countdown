<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0a; --text: #f0ede8; --accent: #e8c547; --dim: rgba(240,237,232,0.3); }
  body {
    background: var(--bg); color: var(--text);
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden; font-family: 'Courier New', Courier, monospace;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }
  .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
  .setup { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .setup-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
  .setup-title { font-size: clamp(36px, 6vw, 72px); font-weight: bold; color: var(--text); letter-spacing: 0.05em; }
  .input-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  input[type="date"], input[type="time"] {
    background: rgba(240,237,232,0.05); border: 1px solid rgba(240,237,232,0.2);
    color: var(--text); font-family: 'Courier New', monospace; font-size: 15px;
    padding: 12px 16px; outline: none; letter-spacing: 0.1em; border-radius: 2px; color-scheme: dark;
  }
  input:focus { border-color: var(--accent); }
  .go-btn {
    background: var(--accent); color: #0a0a0a; border: none;
    font-family: 'Courier New', monospace; font-weight: bold; font-size: 16px;
    letter-spacing: 0.15em; padding: 13px 32px; cursor: pointer; border-radius: 2px; text-transform: uppercase;
  }
  .go-btn:hover { opacity: 0.85; }
  .countdown { display: none; flex-direction: column; align-items: center; }
  .target-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .target-name { font-size: clamp(20px, 3vw, 40px); font-weight: bold; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 40px; }
  .units { display: flex; gap: clamp(12px, 2.5vw, 40px); align-items: flex-end; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .num { font-size: clamp(70px, 13vw, 170px); font-weight: bold; line-height: 0.9; color: var(--text); min-width: 1.8ch; text-align: center; transition: color 0.2s; }
  .num.flash { color: var(--accent); }
  .unit-label { font-size: clamp(9px, 0.8vw, 12px); letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
  .sep { font-size: clamp(50px, 9vw, 120px); color: rgba(240,237,232,0.1); line-height: 1; padding-bottom: 28px; user-select: none; font-weight: bold; }
  .progress-wrap { width: clamp(280px, 60vw, 720px); margin-top: 40px; }
  .progress-track { width: 100%; height: 2px; background: rgba(240,237,232,0.1); }
  .progress-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 1s linear; }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px; letter-spacing: 0.2em; color: rgba(240,237,232,0.3); text-transform: uppercase; }
  .done-msg { font-size: clamp(60px, 12vw, 160px); font-weight: bold; color: var(--accent); letter-spacing: 0.08em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .reset-btn { margin-top: 28px; background: transparent; border: 1px solid rgba(240,237,232,0.15); color: rgba(240,237,232,0.3); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; border-radius: 2px; }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="setup" id="setup">
    <div class="setup-label">Set your target</div>
    <div class="setup-title">COUNTDOWN TO</div>
    <div class="input-row">
      <input type="date" id="dateInput" />
      <input type="time" id="timeInput" value="00:00" />
      <button class="go-btn" onclick="startCountdown()">Go</button>
    </div>
  </div>
  <div class="countdown" id="countdown">
    <div class="target-label">Counting down to</div>
    <div class="target-name" id="targetName">-</div>
    <div class="units" id="unitsEl">
      <div class="unit"><div class="num" id="daysNum">00</div><div class="unit-label">Days</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="num" id="hoursNum">00</div><div class="unit-label">Hours</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="num" id="minsNum">00</div><div class="unit-label">Mins</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="num" id="secsNum">00</div><div class="unit-label">Secs</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-meta"><span id="progressLeft">-</span><span id="progressPct">0%</span></div>
    </div>
    <button class="reset-btn" onclick="resetCountdown()">Change target</button>
  </div>
</div>
<script>
  var targetTime=null,startTime=null,interval=null,lastSecs=-1;
  var today=new Date();
  var yyyy=today.getFullYear(),mm=String(today.getMonth()+1).padStart(2,'0'),dd=String(today.getDate()).padStart(2,'0');
  document.getElementById('dateInput').value=yyyy+'-'+mm+'-'+dd;
  function pad(n){return String(n).padStart(2,'0');}
  function startCountdown(){
    var dateVal=document.getElementById('dateInput').value;
    var timeVal=document.getElementById('timeInput').value||'00:00';
    if(!dateVal){alert('Pick a date');return;}
    targetTime=new Date(dateVal+'T'+timeVal+':00');
    if(isNaN(targetTime)){alert('Invalid date');return;}
    startTime=new Date();
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d=targetTime;
    document.getElementById('targetName').textContent=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+'  '+pad(d.getHours())+':'+pad(d.getMinutes());
    document.getElementById('setup').style.display='none';
    document.getElementById('countdown').style.display='flex';
    update();interval=setInterval(update,1000);
  }
  function update(){
    var now=new Date(),diff=targetTime-now;
    if(diff<=0){
      clearInterval(interval);
      document.getElementById('unitsEl').innerHTML='<div class="done-msg">TIME\'S UP</div>';
      document.getElementById('progressFill').style.width='100%';
      document.getElementById('progressLeft').textContent='Done';
      document.getElementById('progressPct').textContent='100%';
      return;
    }
    var totalSecs=Math.floor(diff/1000);
    var days=Math.floor(totalSecs/86400),hours=Math.floor((totalSecs%86400)/3600),mins=Math.floor((totalSecs%3600)/60),secs=totalSecs%60;
    document.getElementById('daysNum').textContent=pad(days);
    document.getElementById('hoursNum').textContent=pad(hours);
    document.getElementById('minsNum').textContent=pad(mins);
    var secsEl=document.getElementById('secsNum');
    secsEl.textContent=pad(secs);
    if(secs!==lastSecs){secsEl.classList.remove('flash');void secsEl.offsetWidth;secsEl.classList.add('flash');setTimeout(function(){secsEl.classList.remove('flash');},250);lastSecs=secs;}
    var totalDuration=targetTime-startTime,elapsed=now-startTime,pct=Math.min(100,Math.max(0,(elapsed/totalDuration)*100));
    document.getElementById('progressFill').style.width=pct.toFixed(2)+'%';
    document.getElementById('progressPct').textContent=pct.toFixed(1)+'%';
    var leftStr=days>0?days+'d '+hours+'h remaining':hours>0?hours+'h '+mins+'m remaining':mins+'m '+secs+'s remaining';
    document.getElementById('progressLeft').textContent=leftStr;
  }
  function resetCountdown(){
    clearInterval(interval);
    document.getElementById('setup').style.display='flex';
    document.getElementById('countdown').style.display='none';
    document.getElementById('unitsEl').innerHTML='<div class="unit"><div class="num" id="daysNum">00</div><div class="unit-label">Days</div></div><div class="sep">:</div><div class="unit"><div class="num" id="hoursNum">00</div><div class="unit-label">Hours</div></div><div class="sep">:</div><div class="unit"><div class="num" id="minsNum">00</div><div class="unit-label">Mins</div></div><div class="sep">:</div><div class="unit"><div class="num" id="secsNum">00</div><div class="unit-label">Secs</div></div>';
  }
</script>
</body>
</html>
